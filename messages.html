und:var(--surface)}.panel-head h2{font-size:19px}.conversation-search{width:100%;height:42px;margin-top:10px;padding:0 13px;border:1px solid var(--border);border-radius:999px;outline:none;background:var(--soft);color:var(--text)}.conversation-list{padding:8px}.conversation{width:100%;padding:10px;border:none;border-radius:12px;display:grid;grid-template-columns:48px minmax(0,1fr) auto;align-items:center;gap:9px;background:transparent;color:var(--text);text-align:left}.conversation:hover,.conversation.active{background:var(--blue-soft)}.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:13px;font-weight:700}.conversation-copy{min-width:0}.conversation-copy strong,.conversation-copy span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.conversation-copy strong{font-size:12.5px}.conversation-copy span{color:var(--muted);font-size:9.5px}.conversation time{color:var(--muted);font-size:8.5px}.chat-panel{min-width:0;display:grid;grid-template-rows:68px minmax(0,1fr) auto;background:linear-gradient(180deg,var(--soft),var(--page))}.chat-head{padding:0 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}.chat-person{display:flex;align-items:center;gap:10px}.chat-person .avatar{width:44px;height:44px}.chat-person strong{display:block;font-size:13px}.chat-person span{display:block;color:var(--green);font-size:9px}.chat-actions{display:flex;gap:7px}.messages{padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}.day-divider{align-self:center;padding:4px 10px;border-radius:999px;background:var(--surface);color:var(--muted);font-size:9px;box-shadow:var(--shadow)}.bubble-row{display:flex;gap:7px;align-items:flex-end}.bubble-row.mine{justify-content:flex-end}.bubble{max-width:min(520px,75%);padding:10px 13px;border:1px solid var(--border);border-radius:16px 16px 16px 4px;background:var(--surface);font-size:12px;line-height:1.8;box-shadow:0 4px 13px rgba(22,58,98,.05);white-space:pre-wrap}.mine .bubble{border-color:transparent;border-radius:16px 16px 4px 16px;background:var(--blue);color:#fff}.bubble time{display:block;margin-top:4px;opacity:.72;font-family:Arial,sans-serif;font-size:8px;text-align:right}.composer{padding:12px 15px;border-top:1px solid var(--border);display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:end;gap:8px;background:var(--surface)}.composer textarea{width:100%;max-height:130px;min-height:44px;padding:10px 13px;border:1px solid var(--border);border-radius:20px;resize:none;outline:none;background:var(--soft);color:var(--text);line-height:1.6}.send{width:44px;height:44px;border:none;border-radius:50%;background:var(--blue);color:#fff;font-size:17px}.attach{width:40px;height:40px;border:none;border-radius:50%;background:var(--soft);color:var(--text-soft)}.profile-card{padding:22px 16px;text-align:center}.profile-avatar{width:86px;height:86px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-size:24px;font-weight:700}.profile-card h2{margin-top:10px;font-size:17px}.profile-card p{margin-top:4px;color:var(--text-soft);font-size:10.5px;line-height:1.75}.profile-buttons{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:7px}.profile-buttons a{min-height:38px;border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--soft);color:var(--blue);font-size:10px;font-weight:700}.profile-info{padding:0 15px 15px}.profile-info a{padding:11px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--text-soft);font-size:11px}.mobile-conversations{display:none}.empty-note{padding:20px;color:var(--muted);font-size:11px;text-align:ce <body><header class="topbar"><a href="index.html" class="brand"><span>🌿</span><div><h1>ভুবনডাঙ্গার বার্তা</h1><p>সাহিত্যিক কথোপকথনের ব্যক্তিগত জায়গা</p></div></a><div class="top-actions"><button class="round mobile-conversations" id="openConversations">☰</button><a class="round" href="index.html">⌂</a><button class="round" id="themeButton"><span id="themeIcon">🌙</span></button><a class="round" href="profile.html?user=your-profile">আপ</a></div></header>
<main class="messenger"><aside class="conversation-panel" id="conversationPanel"><div class="panel-head"><h2>বার্তা</h2><input class="conversation-search" id="conversationSearch" placeholder="নাম বা বার্তা খুঁজুন..."></div><div class="conversation-list" id="conversationList"></div></aside><section class="chat-panel"><header class="chat-head"><div class="chat-person"><div class="avatar" id="chatAvatar">মস</div><div><strong id="chatName">মাহমুদ সোহেল</strong><span>● সক্রিয়</span></div></div><div class="chat-actions"><a class="round" id="chatProfileLink" href="profile.html?user=mahmud-sohel">👤</a><button class="round" id="clearThread">⋯</button></div></header><div class="messages" id="messageList"></div><form class="composer" id="messageComposer"><button class="attach" type="button">＋</button><textarea id="messageInput" maxlength="3000" placeholder="একটি বার্তা লিখুন..."></textarea><button class="send" type="submit">➤</button></form></section><aside class="profile-panel"><div class="profile-card"><div class="profile-avatar" id="sideAvatar">মস</div><h2 id="sideName">মাহমুদ সোহেল</h2><p id="sideBio">কবি, লেখক ও ভুবনডাঙ্গার সাহিত্যিক সদস্য</p><div class="profile-buttons"><a id="sideProfileLink" href="profile.html?user=mahmud-sohel">প্রোফাইল</a><a href="memories.html">স্মৃতি</a></div></div><div class="profile-info"><a href="policy.html">বার্তার নীতিমালা <span>›</span></a><a href="privacy-security-policy.html">গোপনীয়তা <span>›</span></a><a href="complaint.html">অভিযোগ করুন <span>›</span></a></div></aside></main>
<script>
(function(){"use strict";var root=document.documentElement;root.setAttribute("data-theme",localStorage.getItem("bhubondangaTheme")||"light");var params=new URLSearchParams(location.search),bn={0:"০",1:"১",2:"২",3:"৩",4:"৪",5:"৫",6:"৬",7:"৭",8:"৮",9:"৯"};function toBn(v){return String(v).replace(/[0-9]/g,function(d){return bn[d]})}function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}function initials(v){var w=String(v||"").trim().split(/\s+/);return w.length>1?w[0].slice(0,1)+w[w.length-1].slice(0,1):String(v||"আপ").slice(0,2)}function getArray(k){try{var x=JSON.parse(localStorage.getItem(k)||"[]");return Array.isArray(x)?x:[]}catch(e){return []}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}var directory={"mahmud-sohel":{name:"মাহমুদ সোহেল",bio:"কবি, লেখক ও ভুবনডাঙ্গার কবিতার প্রতিষ্ঠাতা"},"nira-rahman":{name:"নীরা রহমান",bio:"কবি ও চিঠিকার"},"shubhashis":{name:"শুভাশিস",bio:"কবি ও প্রলাপকার"},"sadia-islam":{name:"সাদিয়া ইসলাম",bio:"লেখক ও আবৃত্তিকার"},"your-profile":{name:"আপনার প্রোফাইল",bio:"ভুবনডাঙ্গার সাহিত্যিক সদস্য"}};var currentSlug=params.get("user")||"mahmud-sohel",currentName=params.get("name")||directory[currentSlug]?.name||currentSlug.replace(/-/g," ");if(!directory[currentSlug])directory[currentSlug]={name:currentName,bio:"ভুবনডাঙ্গার সাহিত্যিক সদস্য"};var contacts=Object.keys(directory).map(function(slug){return{slug:slug,name:directory[slug].name,bio:directory[slug].bio}});function key(){return"bhubondangaMessageThread_"+currentSlug}function thread(){return getArray(key())}function formatTime(v){var d=new Date(v);return isNaN(d)?"":new Intl.DateTimeFormat("bn-BD",{hour:"numeric",minute:"2-digit"}).format(d)}function renderHeader(){var p=directory[currentSlug];["chatAvatar","sideAvatar"].forEach(function(id){document.getElementById(id).textContent=initials(p.name)});document.getElementById("chatName").textContent=p.name;document.getElementById("sideName").textContent=p.name;document.getElementById("sideBio").textContent=p.bio;["chatProfileLink","sideProfileLink"].forEach(function(id){document.getElementById(id).href="profile.html?user="+encodeURIComponent(currentSlug)})}function renderMessages(){var list=thread();var box=document.getElementById("messageList");box.innerHTML='<div class="day-divider">আজ</div>';if(!list.length)list=[{id:"welcome",mine:false,text:"স্বাগতম। সাহিত্য ও প্রয়োজনীয় বিষয়ে সম্মানজনকভাবে বার্তা লিখুন।",time:new Date().toISOString()}];list.forEach(function(m){var row=document.createElement("div");row.className="bubble-row"+(m.mine?" mine":" ");row.innerHTML='<div class="bubble">'+esc(m.text)+'<time>'+esc(formatTime(m.time))+(m.mine?" · ✓✓":"")+'</time></div>';box.appendChild(row)});box.scrollTop=box.scrollHeight}function latest(slug){var a=getArray("bhubondangaMessageThread_"+slug);return a.length?a[a.length-1].text:"কথোপকথন শুরু করুন"}function renderContacts(q){q=String(q||"").toLocaleLowerCase("bn-BD");var box=document.getElementById("conversationList");box.innerHTML="";contacts.filter(function(c){return !q||c.name.toLocaleLowerCase("bn-BD").includes(q)||latest(c.slug).toLocaleLowerCase("bn-BD").includes(q)}).forEach(function(c){var b=document.createElement("button");b.type="button";b.className="conversation"+(c.slug===currentSlug?" active":"");b.innerHTML='<span class="avatar">'+esc(initials(c.name))+'</span><span class="conversation-copy"><strong>'+esc(c.name)+'</strong><span>'+esc(latest(c.slug))+'</span></span><time>এখন</time>';b.onclick=function(){location.href="messages.html?user="+encodeURIComponent(c.slug)+"&name="+encodeURIComponent(c.name)};box.appendChild(b)})}document.getElementById("messageComposer").addEventListener("submit",function(e){e.preventDefault();var input=document.getElementById("messageInput"),text=input.value.trim();if(!text)return;var a=thread();a.push({id:Date.now(),mine:true,text:text,time:new Date().toISOString()});save(key(),a.slice(-500));var sent=getArray("bhubondangaSentMessages");sent.unshift({id:Date.now(),recipient:directory[currentSlug].name,recipientSlug:currentSlug,body:text,sentAt:new Date().toISOString()});save("bhubondangaSentMessages",sent.slice(0,500));input.value="";renderMessages();renderContacts(document.getElementById("conversationSearch").value)});document.getElementById("messageInput").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();document.getElementById("messageComposer").requestSubmit()}});document.getElementById("conversationSearch").oninput=function(){renderContacts(this.value)};document.getElementById("clearThread").onclick=function(){if(confirm("এই কথোপকথনটি মুছে ফেলবেন?")){save(key(),[]);renderMessages();renderContacts("")}};var panel=document.getElementById("conversationPanel");document.getElementById("openConversations").onclick=function(){panel.classList.toggle("open")};document.addEventListener("click",function(e){if(innerWidth<=700&&panel.classList.contains("open")&&!panel.contains(e.target)&&!e.target.closest("#openConversations"))panel.classList.remove("open")});var theme=document.getElementById("themeIcon");function ti(){theme.textContent=root.getAttribute("data-theme")==="dark"?"☀️":"🌙"}document.getElementById("themeButton").onclick=function(){var n=root.getAttribute("data-theme")==="dark"?"light":"dark";root.setAttribute("data-theme",n);localStorage.setItem("bhubondangaTheme",n);ti()};ti();renderHeader();renderMessages();renderContacts("")})();
</script></body></html>
