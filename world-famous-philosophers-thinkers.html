<script>


const philosophers=[


["অগাস্টিন (Saint Augustine)","খ্রিস্টীয় দার্শনিক","৩৫৪–৪৩০ খ্রি.","রোমান সাম্রাজ্য","সেন্ট অগাস্টিন ছিলেন খ্রিস্টীয় দর্শনের অন্যতম প্রধান চিন্তাবিদ। ঈশ্বর, নৈতিকতা, আত্মা এবং মানব অস্তিত্ব নিয়ে তাঁর লেখা পশ্চিমা দর্শনে গভীর প্রভাব ফেলেছে।"],


["অ্যারিস্টটল (Aristotle)","দার্শনিক ও বিজ্ঞানী","৩৮৪–৩২২ খ্রি.পূ.","গ্রিস","অ্যারিস্টটল ছিলেন প্লেটোর ছাত্র এবং পাশ্চাত্য দর্শনের অন্যতম ভিত্তি নির্মাতা। যুক্তিবিদ্যা, রাজনীতি, নৈতিকতা ও বিজ্ঞানে তাঁর অবদান অসাধারণ।"],


["আল-কিন্দি (Al-Kindi)","দার্শনিক","৮০১–৮৭৩ খ্রি.","ইরাক","ইসলামিক দর্শনের প্রথম দিকের মহান চিন্তাবিদদের একজন। তিনি গ্রিক দর্শনকে আরবি জ্ঞানচর্চার সঙ্গে যুক্ত করেন।"],


["আল-ফারাবি (Al-Farabi)","দার্শনিক","৮৭২–৯৫০ খ্রি.","মধ্য এশিয়া","রাষ্ট্রদর্শন, যুক্তিবিদ্যা ও দর্শনে গুরুত্বপূর্ণ অবদান রাখেন। তাঁকে দ্বিতীয় শিক্ষক বলা হয়।"],


["আভিসেনা / ইবনে সিনা","দার্শনিক ও চিকিৎসাবিজ্ঞানী","৯৮০–১০৩৭ খ্রি.","পারস্য","ইবনে সিনা ছিলেন বিশ্বখ্যাত মুসলিম দার্শনিক ও চিকিৎসক। তাঁর 'ক্যানন অব মেডিসিন' শতাব্দীর পর শতাব্দী চিকিৎসাবিজ্ঞানের ভিত্তি ছিল।"],


["ইমানুয়েল কান্ট","দার্শনিক","১৭২৪–১৮০৪","প্রুশিয়া","আধুনিক দর্শনের অন্যতম শ্রেষ্ঠ চিন্তাবিদ। জ্ঞান, নৈতিকতা ও মানব স্বাধীনতা নিয়ে তাঁর দর্শন বিখ্যাত।"],


["এরিস্টিপাস","দার্শনিক","৪৩৫–৩৫৬ খ্রি.পূ.","গ্রিস","সুখ ও আনন্দকে জীবনের গুরুত্বপূর্ণ বিষয় হিসেবে বিবেচনা করা সাইরেনাইক দর্শনের প্রতিষ্ঠাতা।"],


["এপিকিউরাস","দার্শনিক","৩৪১–২৭০ খ্রি.পূ.","গ্রিস","মানুষের শান্তি, সুখ ও ভয়মুক্ত জীবন নিয়ে তাঁর দর্শন বিখ্যাত।"],


["কনফুসিয়াস","দার্শনিক","৫৫১–৪৭৯ খ্রি.পূ.","চীন","চীনের অন্যতম শ্রেষ্ঠ নৈতিক দার্শনিক। শিক্ষা, পরিবার ও সামাজিক দায়িত্বের উপর গুরুত্ব দিয়েছেন।"],


["কার্ল মার্কস","দার্শনিক ও সমাজচিন্তক","১৮১৮–১৮৮৩","জার্মানি","মার্কসবাদী দর্শনের প্রতিষ্ঠাতা। সমাজ, অর্থনীতি ও শ্রেণি সম্পর্ক নিয়ে তাঁর চিন্তা বিশ্বজুড়ে প্রভাব ফেলেছে।"],


["গৌতম বুদ্ধ","দার্শনিক ও আধ্যাত্মিক শিক্ষক","৫৬৩–৪৮৩ খ্রি.পূ.","প্রাচীন ভারত","বৌদ্ধ দর্শনের প্রতিষ্ঠাতা। দুঃখ, করুণা, অহিংসা ও নৈতিক জীবনের শিক্ষা দিয়ে মানবসভ্যতায় গভীর প্রভাব রেখেছেন।"],


["গটফ্রিড লাইবনিজ","দার্শনিক ও গণিতবিদ","১৬৪৬–১৭১৬","জার্মানি","যুক্তিবাদী দর্শনের অন্যতম প্রধান প্রতিনিধি। গণিত ও দর্শনে গুরুত্বপূর্ণ অবদান রাখেন।"],


["জঁ-জাক রুশো","দার্শনিক","১৭১২–১৭৭৮","ফ্রান্স","সামাজিক চুক্তি তত্ত্বের প্রবক্তা। স্বাধীনতা ও সমাজব্যবস্থা নিয়ে তাঁর চিন্তা আধুনিক রাজনীতিতে গুরুত্বপূর্ণ।"],


["জন লক","দার্শনিক","১৬৩২–১৭০৪","ইংল্যান্ড","আধুনিক উদারনৈতিক দর্শনের অন্যতম জনক। মানুষের অধিকার ও স্বাধীনতা নিয়ে গুরুত্বপূর্ণ ধারণা দেন।"],


["ডেভিড হিউম","দার্শনিক","১৭১১–১৭৭৬","স্কটল্যান্ড","অভিজ্ঞতাবাদী দর্শনের অন্যতম প্রধান চিন্তাবিদ। জ্ঞান ও মানুষের মন নিয়ে গবেষণা করেন।"],


["দেকার্ত (René Descartes)","দার্শনিক ও গণিতবিদ","১৫৯৬–১৬৫০","ফ্রান্স","তাঁকে আধুনিক দর্শনের জনক বলা হয়। 'আমি চিন্তা করি, তাই আমি আছি' তাঁর বিখ্যাত উক্তি।"],


["প্লেটো","দার্শনিক","৪২৮–৩৪৮ খ্রি.পূ.","গ্রিস","সক্রেটিসের ছাত্র এবং অ্যাকাডেমির প্রতিষ্ঠাতা। আদর্শ রাষ্ট্র ও জ্ঞানতত্ত্ব নিয়ে তাঁর চিন্তা বিখ্যাত।"],


["পাইথাগোরাস","দার্শনিক ও গণিতবিদ","৫৭০–৪৯৫ খ্রি.পূ.","গ্রিস","গণিত ও দর্শনের সমন্বয়ে গুরুত্বপূর্ণ চিন্তাধারা তৈরি করেন।"],


["রবীন্দ্রনাথ ঠাকুর","কবি ও দার্শনিক","১৮৬১–১৯৪১","ভারত","নোবেলজয়ী বাঙালি মনীষী। মানবতাবাদ, শিক্ষা ও বিশ্বমানবতার দর্শনে তাঁর অবদান অনন্য।"],


["রুমি","কবি ও আধ্যাত্মিক দার্শনিক","১২০৭–১২৭৩","পারস্য","সুফি দর্শনের অন্যতম শ্রেষ্ঠ কবি। প্রেম, মানবতা ও আত্মার উন্নতি নিয়ে তাঁর শিক্ষা বিশ্বব্যাপী জনপ্রিয়।"],


["সক্রেটিস","দার্শনিক","৪৭০–৩৯৯ খ্রি.পূ.","গ্রিস","পাশ্চাত্য দর্শনের অন্যতম জনক। প্রশ্ন ও যুক্তির মাধ্যমে সত্য অনুসন্ধানের পদ্ধতি প্রতিষ্ঠা করেন।"],


["সোরেন কিয়ের্কেগার্ড","দার্শনিক","১৮১৩–১৮৫৫","ডেনমার্ক","অস্তিত্ববাদী দর্শনের অন্যতম পথিকৃৎ। ব্যক্তি স্বাধীনতা ও বিশ্বাস নিয়ে গভীর চিন্তা করেন।"],


["ফ্রিডরিখ নিৎসে","দার্শনিক","১৮৪৪–১৯০০","জার্মানি","আধুনিক দর্শনের অন্যতম প্রভাবশালী চিন্তাবিদ। নৈতিকতা ও মানব প্রকৃতি নিয়ে নতুন চিন্তা দেন।"],


["বার্ট্রান্ড রাসেল","দার্শনিক ও গণিতবিদ","১৮৭২–১৯৭০","যুক্তরাজ্য","বিশ্লেষণী দর্শনের অন্যতম প্রতিষ্ঠাতা এবং নোবেলজয়ী চিন্তাবিদ।"],


["মহাত্মা গান্ধী","দার্শনিক নেতা","১৮৬৯–১৯৪৮","ভারত","অহিংসা ও সত্যাগ্রহ দর্শনের প্রবক্তা। মানবাধিকার আন্দোলনে তাঁর প্রভাব বিশাল।"],


["মার্টিন হাইডেগার","দার্শনিক","১৮৮৯–১৯৭৬","জার্মানি","অস্তিত্ব ও মানব জীবনের অর্থ নিয়ে গুরুত্বপূর্ণ দর্শন তৈরি করেন।"],


["মিশেল ফুকো","দার্শনিক","১৯২৬–১৯৮৪","ফ্রান্স","ক্ষমতা, জ্ঞান ও সমাজব্যবস্থা নিয়ে আধুনিক দর্শনে গুরুত্বপূর্ণ অবদান রাখেন।"],


["ভলতেয়ার","দার্শনিক ও লেখক","১৬৯৪–১৭৭৮","ফ্রান্স","আলোকায়ন যুগের অন্যতম প্রধান চিন্তাবিদ। স্বাধীন চিন্তা ও মানবাধিকারের পক্ষে ছিলেন।"],


["উইলিয়াম জেমস","দার্শনিক ও মনোবিজ্ঞানী","১৮৪২–১৯১০","যুক্তরাষ্ট্র","প্র্যাগমাটিজম দর্শনের অন্যতম প্রতিষ্ঠাতা।"],


["জেনো অব সিটিয়াম","দার্শনিক","৩৩৪–২৬২ খ্রি.পূ.","সাইপ্রাস","স্টোয়িক দর্শনের প্রতিষ্ঠাতা। আত্মসংযম ও নৈতিক জীবনের শিক্ষা দিয়েছেন।"]


];


philosophers.sort((a,b)=>a[0].localeCompare(b[0]));



function display(data){

let html="";
let letter="";


data.forEach(p=>{

let l=p[0][0];

if(l!==letter){

letter=l;

html+=`
<div class="alpha">
${letter}
</div>
`;

}


html+=`

<div class="card">

<h2>${p[0]}</h2>

<h3>${p[1]}</h3>

<p><b>সময়কাল:</b> ${p[2]}</p>

<p><b>দেশ:</b> ${p[3]}</p>

<p>${p[4]}</p>

</div>

`;

});


document.getElementById("list").innerHTML=html;

}



function searchPerson(){

let q=document.getElementById("search").value.toLowerCase();

display(
philosophers.filter(x=>x[0].toLowerCase().includes(q))
);

}


display(philosophers);


</script>

</body>
</html>
