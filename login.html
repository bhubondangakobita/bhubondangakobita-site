<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - ভুবনডাঙ্গার কবিতা</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap');


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    font-family:'Noto Serif Bengali',serif;
    background:#f7f4ec;
    color:#142d5c;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}


/* Main Box */

.login-box{

    width:90%;
    max-width:450px;
    background:white;
    padding:40px 35px;
    border-radius:30px;
    box-shadow:0 10px 35px rgba(0,0,0,.12);
    text-align:center;

}



/* Logo */

.logo{

    font-size:45px;
}


h1{

    color:#123b78;
    font-size:32px;
    margin-top:10px;

}


.subtitle{

    color:#666;
    margin-top:8px;
    font-size:16px;

}



/* Buttons */


.social-btn{

    width:100%;
    padding:14px;
    margin-top:20px;
    border-radius:30px;
    border:none;
    font-size:16px;
    cursor:pointer;
    font-family:inherit;

}


.google{

    background:#ffffff;
    border:1px solid #ddd;
    color:#333;

}


.facebook{

    background:#123b78;
    color:white;

}



.divider{

    margin:25px 0;
    color:#999;

}




input{

    width:100%;
    padding:15px;
    margin-top:15px;
    border-radius:20px;
    border:1px solid #dccca5;
    font-size:15px;
    font-family:inherit;

}



.login-btn{

    width:100%;
    padding:15px;
    margin-top:25px;
    border:none;
    border-radius:30px;
    background:#123b78;
    color:white;
    font-size:17px;
    cursor:pointer;

}



.register{

    margin-top:25px;
    color:#555;

}


.register a{

    color:#123b78;
    text-decoration:none;
    font-weight:bold;

}



.quote{

    margin-top:35px;
    padding:20px;
    border:1px solid #dccca5;
    border-radius:20px;
    color:#123b78;
    font-size:18px;
    line-height:1.8;

}



</style>

</head>


<body>


<div class="login-box">


<div class="logo">
🌿
</div>


<h1>
ভুবনডাঙ্গার কবিতা
</h1>


<p class="subtitle">
বাংলা সাহিত্য ও সৃজনশীলতার একটি মুক্ত ভুবন
</p>



<button class="social-btn google">

🔵 Google দিয়ে প্রবেশ করুন

</button>



<button class="social-btn facebook">

🔵 Facebook দিয়ে প্রবেশ করুন

</button>



<div class="divider">

──────── অথবা ────────

</div>



<input 
type="email"
placeholder="আপনার Email লিখুন">



<input 
type="password"
placeholder="Password">


<button class="login-btn">

প্রবেশ করুন

</button>



<p class="register">

নতুন লেখক?

<a href="#">

রেজিস্ট্রেশন করুন

</a>

</p>



<div class="quote">

নিজের প্রতিও শ্রদ্ধা রেখো,<br>

ভালোবাসা রেখো মনে।<br>

কেউ মুগ্ধ হবে না জেনেও,<br>

যেমন ফুল ফোটে বনে।<br><br>

— মাহমুদ সোহেল

</div>


</div>


</body>
</html>
