<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration - ভুবনডাঙ্গার কবিতা</title>


<style>


@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap');


*{

margin:0;
padding:0;
box-sizing:border-box;

}


body{

font-family:'Noto Serif Bengali',serif;

background:#f7f4ec;

color:#142d5c;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



/* MAIN BOX */


.register-box{


width:95%;

max-width:550px;

background:white;

padding:40px;

border-radius:30px;

box-shadow:0 10px 35px rgba(0,0,0,.12);


}



/* HEADER */


.logo{

text-align:center;

font-size:45px;

}



h1{

text-align:center;

color:#123b78;

font-size:32px;

margin-top:10px;

}



.subtitle{

text-align:center;

color:#666;

margin:10px 0 30px;

}



/* INPUT */


label{

display:block;

margin-top:18px;

font-weight:600;

color:#123b78;

}



input,
textarea,
select{


width:100%;

padding:14px;

margin-top:8px;

border:1px solid #dccca5;

border-radius:15px;

font-family:inherit;

font-size:15px;


}



textarea{

height:120px;

resize:none;

}



/* ROLE */


.role-box{


display:flex;

gap:20px;

margin-top:10px;


}



.role-box div{


flex:1;

border:1px solid #dccca5;

padding:15px;

border-radius:15px;

text-align:center;

cursor:pointer;


}



/* BUTTON */


.submit-btn{


width:100%;

margin-top:30px;

padding:15px;

border:none;

border-radius:30px;

background:#123b78;

color:white;

font-size:17px;

cursor:pointer;

font-family:inherit;


}



.submit-btn:hover{

background:#0d356c;

}



/* PENDING */


.notice{


margin-top:25px;

padding:20px;

background:#f7f4ec;

border-radius:20px;

border:1px solid #dccca5;

color:#123b78;

line-height:1.8;

text-align:center;


}



/* LOGIN LINK */


.login-link{


text-align:center;

margin-top:25px;


}



.login-link a{


color:#123b78;

font-weight:bold;

text-decoration:none;


}





@media(max-width:600px){


.register-box{

padding:25px;

}


h1{

font-size:27px;

}


}



</style>


</head>



<body>



<div class="register-box">



<div class="logo">

🌿

</div>



<h1>

ভুবনডাঙ্গার কবিতা

</h1>



<p class="subtitle">

বাংলা সাহিত্য ও সৃজনশীলতার একটি মুক্ত ভুবন

</p>





<label>

আপনার নাম

</label>


<input 
type="text"
placeholder="আপনার পূর্ণ নাম লিখুন">






<label>

Email Address

</label>


<input 
type="email"
placeholder="আপনার Gmail লিখুন">





<label>

Password

</label>


<input 
type="password"
placeholder="একটি Password দিন">





<label>

Profile Picture

</label>


<input 
type="file">






<label>

আপনার পরিচয়

</label>



<div class="role-box">


<div>

✍️

<br>

কবি

</div>



<div>

📖

<br>

পাঠক

</div>



</div>







<label>

ছোট পরিচিতি (Bio)

</label>


<textarea

placeholder="আপনার সম্পর্কে কিছু লিখুন">

</textarea>







<button class="submit-btn">

আবেদন পাঠান

</button>








<div class="notice">


⏳ আপনার আবেদন এখন:

<br>


<strong>

অনুমোদনের অপেক্ষায়

</strong>


<br><br>


অ্যাডমিন অনুমোদনের পর
আপনার লেখক প্রোফাইল সক্রিয় হবে।


</div>








<p class="login-link">

আগেই Account আছে?


<a href="login.html">

Login করুন

</a>


</p>





</div>



</body>

</html>
